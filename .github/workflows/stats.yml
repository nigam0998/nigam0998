name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: lowlighter/metrics@latest
        with:
          filename: devyansh-stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: nigam0998
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          config_display: large
          config_output: svg
          
      - name: Generate Languages Card
        uses: lowlighter/metrics@latest
        with:
          filename: devyansh-langs.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: nigam0998
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_categories: markup, programming
          plugin_languages_colors: "0:00d2ff, 1:3a7bd5, 2:005c97, 3:00c6ff, 4:36d1dc"
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_output: svg

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add devyansh-stats.svg devyansh-langs.svg
          git diff --staged --quiet || git commit -m "📊 Auto-update stats & languages"
          git push
